<!DOCTYPE html><html>
<head>
<title>Raje Birthday</title><style>
body {
  background-color: black;
  color: lime;
  text-align: center;
  font-family: monospace;
  overflow: hidden;
  margin: 0;
}

/* Glow Heading */
h1 {
  color: gold;
  text-shadow: 0 0 10px gold, 0 0 20px gold;
  animation: glow 2s infinite alternate;
}

/* Typing Effect */
.typing {
  overflow: hidden;
  border-right: 2px solid lime;
  white-space: nowrap;
  width: 0;
  animation: typing 4s steps(40, end) forwards, blink 0.7s infinite;
}

/* Floating Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  font-size: 18px;
  animation: float 5s linear infinite;
}

/* Burst Hearts */
.burst {
  position: absolute;
  color: red;
  font-size: 20px;
  pointer-events: none;
  animation: burst 1s ease-out forwards;
}

/* Animations */
@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

@keyframes glow {
  from { text-shadow: 0 0 5px gold; }
  to { text-shadow: 0 0 20px gold, 0 0 30px gold; }
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

@keyframes burst {
  0% { transform: scale(1) translate(0,0); opacity: 1; }
  100% { transform: scale(2) translate(var(--x), var(--y)); opacity: 0; }
}
</style></head><body><h1>👑 Queen Raje 👑</h1><p class="typing">> Initializing system...</p>
<p class="typing">> Access granted ✔</p>
<p class="typing">> Loading: Coding Expert Mode 💻🔥</p><h2>🎉 Happy Birthday Raje! 🎂</h2><p class="typing">> You are a Queen 👑 & Coding Expert 💻😎</p>
<p class="typing">> Future = Unlimited Success 🚀</p><!-- Floating Hearts --><div class="heart" style="left:10%;">❤️</div>
<div class="heart" style="left:40%; animation-delay:1s;">❤️</div>
<div class="heart" style="left:70%; animation-delay:2s;">❤️</div><script>
document.addEventListener("click", function(e) {
  for (let i = 0; i < 10; i++) {
    let heart = document.createElement("div");
    heart.className = "burst";
    heart.innerHTML = "❤️";

    let x = (Math.random() - 0.5) * 200 + "px";
    let y = (Math.random() - 0.5) * 200 + "px";

    heart.style.setProperty('--x', x);
    heart.style.setProperty('--y', y);

    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 1000);
  }
});
</script></body>
</html>
